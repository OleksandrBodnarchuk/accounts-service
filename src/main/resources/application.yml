spring:
  application:
    name: accounts
  devtools:
    restart:
      enabled: true
server:
  port: ${PORT:0} # random port

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:9191/eureka
  instance:
    preferIpAddress: false
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
